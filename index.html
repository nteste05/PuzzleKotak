<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Square Puzzle Pro</title>
    <style>
        body { 
            background: #111; color: white; font-family: 'Segoe UI', sans-serif; 
            text-align: center; margin: 0; padding: 0; overflow: hidden; 
            touch-action: none; -webkit-user-select: none;
        }
        .header { 
            padding: 15px; background: #1a1a1a; border-bottom: 2px solid #444; 
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        #status { color: #00d4ff; font-size: 14px; display: block; margin-top: 5px; font-weight: bold; min-height: 20px; }
        
        .controls {
            position: absolute; right: 10px; top: 12px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .btn-small {
            background: #444; border: none; color: white; 
            padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px;
            font-weight: bold; text-transform: uppercase; width: 100px;
        }
        #resetBtn { background: #d35400; }
        #restartBtn { background: #c0392b; }

        canvas { 
            background: #000; display: block; margin: 15px auto; 
            border: 2px solid #555; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #nextBtn {
            display: none; padding: 15px 40px; font-size: 16px; 
            background: #27ae60; border: none; color: white; 
            border-radius: 50px; font-weight: bold; cursor: pointer;
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="header">
    <b id="levelTitle">LEVEL 1</b>
    <div class="controls">
        <button id="resetBtn" class="btn-small" onclick="loadLevel()">Reset Level</button>
        <button id="restartBtn" class="btn-small" onclick="fullRestart()">Restart Game</button>
    </div>
    <span id="status">Siap Bermain</span>
</div>

<canvas id="puzzleCanvas"></canvas>
<button id="nextBtn" onclick="nextLevel()">LANJUTKAN →</button>

<script>
const imageLibrary = [
    "1.jpeg", "2.jpeg", "3.jpeg", "4.jpeg", "5.jpeg",
    "6.jpeg", "7.jpeg", "8.jpeg", "9.jpeg", "10.jpeg"
];

const canvas = document.getElementById('puzzleCanvas');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('status');
const nextBtn = document.getElementById('nextBtn');
const levelTitle = document.getElementById('levelTitle');

let img = new Image();
let currentLevel = 0;
let rows, cols; 
let pieces = [];
let selectedPiece = null;
let offset = { x: 0, y: 0 };
let isLoading = false;

function setGridConfig() {
    let lv = currentLevel + 1;
    if (lv <= 3) { rows = 6; cols = 3; }
    else if (lv <= 6) { rows = 7; cols = 4; }
    else if (lv <= 9) { rows = 8; cols = 5; }
    else { rows = 9; cols = 6; }
}

// Fungsi Menggambar Progress di Tengah Canvas
function drawLoadingScreen(txt) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00d4ff";
    ctx.font = "bold 20px Segoe UI";
    ctx.textAlign = "center";
    ctx.fillText(txt, canvas.width / 2, canvas.height / 2);
}

async function loadLevel() {
    isLoading = true;
    setGridConfig();
    nextBtn.style.display = "none";
    levelTitle.innerText = `LEVEL ${currentLevel + 1} / ${imageLibrary.length}`;
    statusText.innerText = "Memuat...";
    
    // Reset tampilan canvas (Hapus gambar sebelumnya)
    pieces = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const imageUrl = imageLibrary[currentLevel];

    try {
        const response = await fetch(imageUrl);
        if (!response.ok) throw new Error("Gagal");

        const reader = response.body.getReader();
        const contentLength = +response.headers.get('Content-Length');
        
        let receivedLength = 0;
        let chunks = []; 

        while(true) {
            const {done, value} = await reader.read();
            if (done) break;

            chunks.push(value);
            receivedLength += value.length;

            let progressTxt = "";
            if (contentLength) {
                let percent = Math.round((receivedLength / contentLength) * 100);
                progressTxt = `Mengunduh: ${percent}%`;
            } else {
                progressTxt = `Mengunduh... (${(receivedLength / 1024).toFixed(0)} KB)`;
            }
            drawLoadingScreen(progressTxt);
        }

        const blob = new Blob(chunks);
        const objectURL = URL.createObjectURL(blob);

        img = new Image();
        img.onload = () => {
            drawLoadingScreen("Mengacak puzzle...");
            setTimeout(() => {
                isLoading = false;
                initPuzzle();
                statusText.innerText = "Geser kotak ke posisi yang benar";
                URL.revokeObjectURL(objectURL);
            }, 600);
        };
        img.src = objectURL;

    } catch (err) {
        drawLoadingScreen("Gagal memuat gambar!");
    }
}

function initPuzzle() {
    const availableW = window.innerWidth - 40;
    const availableH = window.innerHeight - 200;
    const ratio = Math.min(availableW / img.width, availableH / img.height);
    
    canvas.width = img.width * ratio;
    canvas.height = img.height * ratio;
    
    const pW = canvas.width / cols;
    const pH = canvas.height / rows;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            pieces.push({
                sx: c * (img.width / cols),
                sy: r * (img.height / rows),
                x: Math.random() * (canvas.width - pW),
                y: Math.random() * (canvas.height - pH),
                correctX: c * pW,
                correctY: r * pH,
                w: pW, h: pH,
                isSolved: false
            });
        }
    }
    draw();
}

function draw() {
    if (isLoading) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
        ctx.save();
        ctx.beginPath();
        ctx.rect(p.x, p.y, p.w, p.h);
        ctx.clip();
        ctx.drawImage(img, p.sx, p.sy, img.width/cols, img.height/rows, p.x, p.y, p.w, p.h);
        ctx.restore();
        
        if (!p.isSolved) {
            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.lineWidth = 1;
            ctx.strokeRect(p.x, p.y, p.w, p.h);
        }
    });
}

function fullRestart() {
    if(confirm("Apakah Anda ingin mengulang dari Level 1?")) {
        currentLevel = 0;
        loadLevel();
    }
}

function nextLevel() {
    currentLevel++;
    if (currentLevel >= imageLibrary.length) {
        alert("SELAMAT! Semua level telah selesai!");
        currentLevel = 0;
    }
    loadLevel();
}

// Handler Input
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
    const clientY = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function onStart(e) {
    if (isLoading) return;
    const pos = getPos(e);
    for (let i = pieces.length - 1; i >= 0; i--) {
        const p = pieces[i];
        if (!p.isSolved && pos.x >= p.x && pos.x <= p.x + p.w && pos.y >= p.y && pos.y <= p.y + p.h) {
            selectedPiece = p;
            offset.x = pos.x - p.x;
            offset.y = pos.y - p.y;
            pieces.splice(i, 1);
            pieces.push(selectedPiece);
            break;
        }
    }
}

function onMove(e) {
    if (selectedPiece) {
        if (e.cancelable) e.preventDefault();
        const pos = getPos(e);
        let tx = pos.x - offset.x;
        let ty = pos.y - offset.y;
        tx = Math.max(0, Math.min(tx, canvas.width - selectedPiece.w));
        ty = Math.max(0, Math.min(ty, canvas.height - selectedPiece.h));
        selectedPiece.x = tx;
        selectedPiece.y = ty;
        draw();
    }
}

function onEnd() {
    if (selectedPiece) {
        const dist = Math.sqrt(Math.pow(selectedPiece.x - selectedPiece.correctX, 2) + Math.pow(selectedPiece.y - selectedPiece.correctY, 2));
        if (dist < 25) {
            selectedPiece.x = selectedPiece.correctX;
            selectedPiece.y = selectedPiece.correctY;
            selectedPiece.isSolved = true;
            pieces.unshift(pieces.pop());
            checkWin();
        }
        selectedPiece = null;
        draw();
    }
}

function checkWin() {
    if (pieces.length > 0 && pieces.every(p => p.isSolved)) {
        statusText.innerText = "BERHASIL!";
        statusText.style.color = "#2ecc71";
        nextBtn.style.display = "block";
    }
}

canvas.addEventListener('mousedown', onStart);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onEnd);
canvas.addEventListener('touchstart', onStart, {passive: false});
window.addEventListener('touchmove', onMove, {passive: false});
window.addEventListener('touchend', onEnd);

// Jalankan Pertama Kali
// Set ukuran canvas awal agar teks loading muncul di tengah
canvas.width = window.innerWidth - 40;
canvas.height = window.innerHeight - 200;
loadLevel();
</script>
</body>
</html>
